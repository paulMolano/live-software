services:
  postgres:
    image: postgres:16-alpine
    container_name: live-software-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-live_software}
      POSTGRES_USER: ${POSTGRES_USER:-live_software}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-live_software}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-live_software} -d ${POSTGRES_DB:-live_software}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: live-software-keycloak
    restart: unless-stopped
    command: start-dev --http-port=${KEYCLOAK_PORT:-8080} --health-enabled=true
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${POSTGRES_DB:-live_software}
      KC_DB_USERNAME: ${POSTGRES_USER:-live_software}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-live_software}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak-data:/opt/keycloak/data

volumes:
  postgres-data:
  keycloak-data:
